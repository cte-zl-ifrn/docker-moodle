global:
  namespace: ava

replicaCount: 1

image:
  repository: ctezlifrn/avamoodlebase
  tag: "4.5.9.028"
  pullPolicy: Always

securityContext:
  runAsUser: 0

nodeSelector:
  kubernetes.io/hostname: tiberias

service:
  type: ClusterIP
  port: 80
  targetPort: 80

# 🐘 Configuração Unificada do Postgres
postgres:
  enabled: true
  host: "postgres.storage.svc.cluster.local"
  name: "moodle"
  user: "postgres"
  port: 5432
  # Configuração do Vault específica para Postgres
  vault:
    path: "dbs/postgres"            # Caminho no Vault
    key: "password"                 # Chave dentro do segredo
    secretName: "postgres-db-secrets" # Nome do Secret K8s a ser criado
    secretKey: "password"           # Chave dentro do Secret K8s (para env var)

# 🔴 Configuração Unificada do Redis (Valkey)
redis:
  enabled: true
  host: "valkey.storage.svc.cluster.local"
  port: 6379
  database: "4"
  prefix: "sess_"
  # Configuração do Vault específica para Redis
  vault:
    path: "dbs/valkey"
    key: "password"
    secretName: "valkey-auth-secret"
    secretKey: "redis-password"

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  existingClaim: "lh-moodle"
  size: 25Gi
  mountPath: /var/moodledata

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  hosts:
    - host: moodle.ead.ifrn.edu.br
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: moodle-tls
      hosts:
        - moodle.ead.ifrn.edu.br

autoscaling:
  enabled: false

affinity: {}
tolerations: []
serviceAccount:
  create: false

#--- Configuração de Afinidade de Nó ---
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - tiberias