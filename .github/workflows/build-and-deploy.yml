name: Build and Deploy

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ${{ vars.DOCKERHUB_HOST }}
  BASE_IMAGE: ctezlifrn/avamoodlebase
  MAIN_IMAGE: ctezlifrn/avamoodle
  DEV_IMAGE: ctezlifrn/avamoodledev

jobs:
  # Detecta mudanças na pasta /base
  detect-base-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_changed: ${{ steps.changes.outputs.base }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changes in /base directory
        id: changes
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"
          
          # Get all tags sorted by version (newest first)
          ALL_TAGS=$(git tag --sort=-version:refname | head -10)
          echo "Recent tags: $ALL_TAGS"
          
          # Find the previous tag
          PREV_TAG=""
          for tag in $ALL_TAGS; do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              PREV_TAG=$tag
              break
            fi
          done
          
          echo "Previous tag: $PREV_TAG"
          
          if [ -z "$PREV_TAG" ]; then
            # No previous tag - check if /base exists
            echo "No previous tag found"
            if [ -d "base" ]; then
              echo "First release - base directory exists"
              echo "base=true" >> $GITHUB_OUTPUT
            else
              echo "base=false" >> $GITHUB_OUTPUT
            fi
          else
            # Compare /base between tags
            echo "Comparing base/ between $PREV_TAG and $CURRENT_TAG"
            if git diff $PREV_TAG $CURRENT_TAG -- base/ | grep -q .; then
              echo "Changes detected in base/"
              echo "base=true" >> $GITHUB_OUTPUT
            else
              echo "No changes in base/"
              echo "base=false" >> $GITHUB_OUTPUT
            fi
          fi

  # Build and push base image (ctezlifrn/avamoodlebase)
  build-base:
    needs: detect-base-changes
    if: needs.detect-base-changes.outputs.base_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./base
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}:latest
          cache-to: type=inline

  # Build and push main image (ctezlifrn/avamoodle)
  build-main:
    needs: build-base
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push main image
        uses: docker/build-push-action@v5
        with:
          context: ./main
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}:${{ github.ref_name }}
          build-args: |
            AVA_IMAGE_VERSION=${{ github.ref_name }}

      - name: Build and push dev image
        uses: docker/build-push-action@v5
        with:
          context: ./main
          target: dev
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}:${{ github.ref_name }}-dev
          build-args: |
            AVA_IMAGE_VERSION=${{ github.ref_name }}
           
  deploy:
    needs: [build-base, build-main]
    if: always() && (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') && needs.build-main.result == 'success'
    runs-on: [self-hosted, runner-dead]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 10.22.1.208 >> ~/.ssh/known_hosts

      - name: Enviar Chart do Helm
        run: |
          ssh root@10.22.1.208 "rm -rf /tmp/moodle-chart"
          scp -r ./helm root@10.22.1.208:/tmp/moodle-chart

      - name: Executar Upgrade no Helm
        run: |
          # Define a tag: usa a tag do git se houver, senão usa o SHA do commit
          DEPLOY_TAG="${{ github.ref_type == 'tag' && github.ref_name || github.sha }}"
          
          ssh root@10.22.1.208 "helm upgrade --install moodle /tmp/moodle-chart \
            --namespace ava \
            --set image.tag=$DEPLOY_TAG \
            --set image.repository=${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}"