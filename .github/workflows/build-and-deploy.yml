name: Build and Deploy

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ${{ vars.DOCKERHUB_HOST }}
  BASE_IMAGE: ctezlifrn/avamoodlebase
  MAIN_IMAGE: ctezlifrn/avamoodle

jobs:
  detect-base-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_changed: ${{ steps.changes.outputs.base }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changes in /base directory
        id: changes
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"
          
          ALL_TAGS=$(git tag --sort=-version:refname | head -10)
          echo "Recent tags: $ALL_TAGS"
          
          PREV_TAG=""
          for tag in $ALL_TAGS; do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              PREV_TAG=$tag
              break
            fi
          done
          
          echo "Previous tag: $PREV_TAG"
          
          if [ -z "$PREV_TAG" ]; then
            if [ -d "base" ]; then
              echo "base=true" >> $GITHUB_OUTPUT
            else
              echo "base=false" >> $GITHUB_OUTPUT
            fi
          else
            if git diff $PREV_TAG $CURRENT_TAG -- base/ | grep -q .; then
              echo "base=true" >> $GITHUB_OUTPUT
            else
              echo "base=false" >> $GITHUB_OUTPUT
            fi
          fi

  build-base:
    needs: detect-base-changes
    if: needs.detect-base-changes.outputs.base_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./base
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}:latest
          cache-to: type=inline

  build-main:
    needs: build-base
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push main image
        uses: docker/build-push-action@v5
        with:
          context: ./main
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}:${{ github.ref_name }}
          build-args: |
            AVA_IMAGE_VERSION=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}:latest
          cache-to: type=inline

  deploy:
    needs: [build-base, build-main]
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') &&
      needs.build-main.result == 'success'
    runs-on: [self-hosted, runner-dead]
    permissions: {}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 10.22.1.208 >> ~/.ssh/known_hosts

      - name: Enviar Chart do Helm
        run: |
          ssh root@10.22.1.208 "rm -rf /tmp/moodle-chart"
          scp -r ./helm root@10.22.1.208:/tmp/moodle-chart

      - name: Executar Upgrade no Helm
        run: |
          ssh root@10.22.1.208 "helm upgrade --install moodle /tmp/moodle-chart \
            --namespace ava \
            --set image.tag=${{ github.ref_name }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}"