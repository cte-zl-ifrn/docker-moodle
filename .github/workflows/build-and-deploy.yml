name: Build and Deploy

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ${{ vars.DOCKERHUB_HOST }}
  BASE_IMAGE: ctezlifrn/avamoodlebase
  MAIN_IMAGE: ctezlifrn/avamoodle
  DEV_IMAGE: ctezlifrn/avamoodledev

jobs:
  detect-base-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_changed: ${{ steps.changes.outputs.base }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changes in /base directory
        id: changes
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"

          ALL_TAGS=$(git tag --sort=-version:refname | head -10)
          echo "Recent tags: $ALL_TAGS"

          PREV_TAG=""
          for tag in $ALL_TAGS; do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              PREV_TAG=$tag
              break
            fi
          done

          echo "Previous tag: $PREV_TAG"

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found"
            if [ -d "base" ]; then
              echo "First release - base directory exists"
              echo "base=true" >> $GITHUB_OUTPUT
            else
              echo "base=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Comparing base/ between $PREV_TAG and $CURRENT_TAG"
            if git diff $PREV_TAG $CURRENT_TAG -- base/ | grep -q .; then
              echo "Changes detected in base/"
              echo "base=true" >> $GITHUB_OUTPUT
            else
              echo "No changes in base/"
              echo "base=false" >> $GITHUB_OUTPUT
            fi
          fi

  build-base:
    needs: detect-base-changes
    if: needs.detect-base-changes.outputs.base_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract Clean Version
        run: echo "CLEAN_VERSION=${GITHUB_REF_NAME%-test}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./base
          push: true
          # AQUI: Usando a versão limpa para a imagem base
          tags: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}:${{ env.CLEAN_VERSION }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}:latest
          cache-to: type=inline
          build-args: |
            NVM_INSTALL_SHA256=${{ vars.NVM_INSTALL_SHA256 }}
            PHPUNIT_11_PHAR_SHA256=${{ vars.PHPUNIT_11_PHAR_SHA256 }}

  build-main:
    needs: build-base
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') &&
      !endsWith(github.ref_name, '-test')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract Clean Version
        run: echo "CLEAN_VERSION=${GITHUB_REF_NAME%-test}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push main image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./main
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}:${{ github.ref_name }}
          build-args: |
            AVA_IMAGE_VERSION=${{ env.CLEAN_VERSION }}
            NVM_INSTALL_SHA256=${{ vars.NVM_INSTALL_SHA256 }}
            PHPUNIT_11_PHAR_SHA256=${{ vars.PHPUNIT_11_PHAR_SHA256 }}

  build-test:
    needs: build-base
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') &&
      endsWith(github.ref_name, '-test')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract Clean Version
        run: echo "CLEAN_VERSION=${GITHUB_REF_NAME%-test}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./main
          target: dev
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.DEV_IMAGE }}:${{ github.ref_name }}
          build-args: |
            AVA_IMAGE_VERSION=${{ env.CLEAN_VERSION }}
            NVM_INSTALL_SHA256=${{ vars.NVM_INSTALL_SHA256 }}
            PHPUNIT_11_PHAR_SHA256=${{ vars.PHPUNIT_11_PHAR_SHA256 }}

  deploy-test:
    needs: [build-test]
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') &&
      needs.build-test.result == 'success' &&
      endsWith(github.ref_name, '-test')
    runs-on: [self-hosted, runner-dead]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Executar Upgrade no Helm
        run: |
          DEPLOY_TAG="${{ github.ref_type == 'tag' && github.ref_name || github.sha }}"

          ssh ${{ vars.K8S_HOST }} "helm upgrade --install moodle /tmp/moodle-chart \
            --namespace ava \
            --set image.tag=$DEPLOY_TAG \
            --set image.repository=${{ env.REGISTRY }}/${{ env.DEV_IMAGE }}"

  deploy-main:
    needs: [build-main]
    if: |
      always() && needs.build-main.result == 'success' &&
      startsWith(github.ref, 'refs/tags/') && !endsWith(github.ref_name, '-test')
    runs-on: [self-hosted, runner-dead]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Executar Upgrade no Docker Compose
        run: |
          DEPLOY_TAG="${{ github.ref_type == 'tag' && github.ref_name || github.sha }}"
          ssh ${{ vars.SSH_HOST }} "sed -i \"s/avamoodle:.*/avamoodle:$DEPLOY_TAG/g\" /var/dockers/docker-compose.yml"
          ssh ${{ vars.SSH_HOST }} "cd /var/dockers && docker compose pull && docker compose down ava && docker compose up -d ava"