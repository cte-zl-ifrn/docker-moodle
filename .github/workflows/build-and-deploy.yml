name: Build and Deploy

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ${{ vars.DOCKERHUB_HOST }}
  BASE_IMAGE: ctezlifrn/avamoodlebase
  MAIN_IMAGE: ctezlifrn/avamoodle

jobs:
  # Detecta mudanças na pasta /base
  detect-base-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_changed: ${{ steps.changes.outputs.base }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changes in /base directory
        id: changes
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"
          
          # Get all tags sorted by version (newest first)
          ALL_TAGS=$(git tag --sort=-version:refname | head -10)
          echo "Recent tags: $ALL_TAGS"
          
          # Find the previous tag
          PREV_TAG=""
          for tag in $ALL_TAGS; do
            if [ "$tag" != "$CURRENT_TAG" ]; then
              PREV_TAG=$tag
              break
            fi
          done
          
          echo "Previous tag: $PREV_TAG"
          
          if [ -z "$PREV_TAG" ]; then
            # No previous tag - check if /base exists
            echo "No previous tag found"
            if [ -d "base" ]; then
              echo "First release - base directory exists"
              echo "base=true" >> $GITHUB_OUTPUT
            else
              echo "base=false" >> $GITHUB_OUTPUT
            fi
          else
            # Compare /base between tags
            echo "Comparing base/ between $PREV_TAG and $CURRENT_TAG"
            if git diff $PREV_TAG $CURRENT_TAG -- base/ | grep -q .; then
              echo "Changes detected in base/"
              echo "base=true" >> $GITHUB_OUTPUT
            else
              echo "No changes in base/"
              echo "base=false" >> $GITHUB_OUTPUT
            fi
          fi

  # Build and push base image (ctezlifrn/avamoodlebase)
  build-base:
    needs: detect-base-changes
    if: needs.detect-base-changes.outputs.base_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./base
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BASE_IMAGE }}:latest
          cache-to: type=inline

  # Build and push main image (ctezlifrn/avamoodle)
  build-main:
    needs: build-base
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push main image
        uses: docker/build-push-action@v5
        with:
          context: ./main
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}:${{ github.ref_name }}
          build-args: |
            AVA_IMAGE_VERSION=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.MAIN_IMAGE }}:latest
          cache-to: type=inline

  # Deploy
  deploy:
    needs: [build-base, build-main]
    if: |
      always() &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped') &&
      needs.build-main.result == 'success'
    runs-on: self-hosted
    permissions: {}

    steps:
      - name: Update Docker Compose and deploy
        run: |
          echo "Deploying service version ${{ github.ref_name }} to ${{ vars.SSH_HOST }}..."
          
          # Update image version in docker-compose.yml
          ssh root@${{ vars.SSH_HOST }} \
            "sed -i 's/avamoodle:.*$/avamoodle:${{ github.ref_name }}/g' /var/dockers/docker-compose.yml"
          
          # Pull, stop and start the service
          ssh root@${{ vars.SSH_HOST }} \
            "cd /var/dockers && docker compose pull --quiet ava && docker compose down ava && docker compose up -d"
          
          # Wait for service to stabilize
          sleep 120
          
          # Show logs
          ssh root@${{ vars.SSH_HOST }} \
            "cd /var/dockers && docker compose logs -n 1000"
          
          echo "Service successfully deployed to ${{ vars.SSH_HOST }}."
